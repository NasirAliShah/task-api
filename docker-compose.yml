version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: task-api-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - task-api-network

  api:
    build: .
    container_name: task-api-app
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://root:password@mongodb:27017
      DATABASE_NAME: taskdb
      SECRET_KEY: your-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_HOURS: 24
    depends_on:
      - mongodb
    volumes:
      - .:/app
    networks:
      - task-api-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongodb_data:

networks:
  task-api-network:
    driver: bridge
